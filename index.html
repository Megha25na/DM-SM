<!DOCTYPE html>
<html>
<head>
    <title>StyleHub Clothing</title>

    <style>
        body{
            font-family: Arial;
            margin: 0;
            padding: 0;
            background-color: #f2f2f2;
        }

        header{
            background-color: black;
            color: white;
            text-align: center;
            padding: 20px;
        }

        nav{
            background-color: #444;
            padding: 10px;
            text-align: center;
        }

        nav a{
            color: white;
            text-decoration: none;
            margin: 15px;
        }

        .container{
            padding: 20px;
        }

        .product{
            background-color: white;
            width: 250px;
            display: inline-block;
            margin: 15px;
            padding: 15px;
            border: 1px solid gray;
            text-align: center;
        }

        .product img{
            width: 200px;
            height: 200px;
        }

        button{
            background-color: black;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
        }

        footer{
            background-color: black;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <header>
        <h1>StyleHub Clothing</h1>
        <p>Simple Fashion Store</p>
    </header>

    <nav>
        <a href="">Home</a>
        <a href="">Men</a>
        <a href="">Women</a>
        <a href="">Contact</a>
    </nav>

    <div class="container">

        <div class="product">
            <img src="https://via.placeholder.com/200" alt="">
            <h2>T-Shirt</h2>
            <p>Price: ₹599</p>
            <button>Buy Now</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/200" alt="">
            <h2>Hoodie</h2>
            <p>Price: ₹1299</p>
            <button>Buy Now</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/200" alt="">
            <h2>Jeans</h2>
            <p>Price: ₹999</p>
            <button>Buy Now</button>
        </div>

    </div>

    <footer>
        <p>© 2026 StyleHub Clothing</p>
    </footer>

</body>
</html>
